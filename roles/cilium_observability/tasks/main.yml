---
- name: Validate required parameters
  ansible.builtin.assert:
    that:
      - cilium_observability_namespace is defined
      - cilium_observability_helm_release_name is defined
    quiet: true

- name: Enable Hubble metrics and Prometheus via Helm upgrade
  kubernetes.core.helm:
    name: "{{ cilium_observability_helm_release_name }}"
    chart_ref: cilium/cilium
    release_namespace: "{{ cilium_observability_namespace }}"
    kubeconfig: "{{ cilium_observability_kubeconfig | default(omit) }}"
    context: "{{ cilium_observability_context | default(omit) }}"
    wait: "{{ cilium_observability_wait }}"
    wait_timeout: "{{ cilium_observability_wait_timeout }}s"
    state: present
    values:
      hubble:
        enabled: true
        metrics:
          enabled: "{{ cilium_observability_hubble_metrics }}"
          serviceMonitor:
            enabled: "{{ cilium_observability_prometheus_enabled }}"
        relay:
          enabled: true
          prometheus:
            enabled: "{{ cilium_observability_prometheus_enabled }}"
            serviceMonitor:
              enabled: "{{ cilium_observability_prometheus_enabled }}"
      prometheus:
        enabled: "{{ cilium_observability_prometheus_enabled }}"
        serviceMonitor:
          enabled: "{{ cilium_observability_prometheus_enabled }}"
      operator:
        prometheus:
          enabled: "{{ cilium_observability_prometheus_enabled }}"
          serviceMonitor:
            enabled: "{{ cilium_observability_prometheus_enabled }}"
  register: cilium_observability_helm_result

- name: Configure Cilium metrics
  stevefulme1.cilium.cilium_metrics_config:
    kubeconfig: "{{ cilium_observability_kubeconfig | default(omit) }}"
    context: "{{ cilium_observability_context | default(omit) }}"
    namespace: "{{ cilium_observability_namespace }}"
    metrics: "{{ cilium_observability_hubble_metrics }}"
    state: present
  when: cilium_observability_prometheus_enabled

- name: Deploy Grafana dashboard ConfigMap for Cilium
  kubernetes.core.k8s:
    kubeconfig: "{{ cilium_observability_kubeconfig | default(omit) }}"
    context: "{{ cilium_observability_context | default(omit) }}"
    state: present
    spec:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cilium-grafana-dashboards
        namespace: "{{ cilium_observability_grafana_namespace }}"
        labels:
          grafana_dashboard: "true"
      data:
        cilium-overview.json: |
          {
            "annotations": {"list": []},
            "editable": true,
            "title": "Cilium Overview",
            "panels": [
              {
                "title": "Policy Drops",
                "type": "stat",
                "targets": [{"expr": "sum(rate(hubble_drop_total[5m]))"}]
              },
              {
                "title": "DNS Requests",
                "type": "stat",
                "targets": [{"expr": "sum(rate(hubble_dns_queries_total[5m]))"}]
              },
              {
                "title": "TCP Connections",
                "type": "graph",
                "targets": [{"expr": "sum(rate(hubble_tcp_flags_total[5m])) by (flag)"}]
              },
              {
                "title": "HTTP Requests",
                "type": "graph",
                "targets": [{"expr": "sum(rate(hubble_http_requests_total[5m])) by (method, status)"}]
              }
            ],
            "schemaVersion": 30,
            "version": 1
          }
  when: cilium_observability_grafana_enabled

- name: Display observability status
  ansible.builtin.debug:
    msg: >-
      Observability stack configured: prometheus={{ cilium_observability_prometheus_enabled }},
      grafana={{ cilium_observability_grafana_enabled }},
      hubble_metrics={{ cilium_observability_hubble_metrics | join(',') }}
