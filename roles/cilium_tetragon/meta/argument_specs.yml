---
argument_specs:
  main:
    short_description: "Deploy Tetragon runtime security enforcement"
    options:
      cilium_tetragon_namespace:
        description: Kubernetes namespace for Tetragon
        type: str
        default: kube-system
      cilium_tetragon_chart_version:
        description: Tetragon Helm chart version
        type: str
        default: "1.3.0"
      cilium_tetragon_helm_repo:
        description: Helm chart repository URL
        type: str
        default: "https://helm.cilium.io/"
      cilium_tetragon_helm_release_name:
        description: Helm release name
        type: str
        default: tetragon
      cilium_tetragon_baseline_policies_enabled:
        description: Deploy baseline TracingPolicy resources
        type: bool
        default: true
      cilium_tetragon_kubeconfig:
        description: Path to kubeconfig file
        type: str
      cilium_tetragon_context:
        description: Kubernetes context to use
        type: str
      cilium_tetragon_wait:
        description: Wait for Tetragon pods to become ready
        type: bool
        default: true
      cilium_tetragon_wait_timeout:
        description: Timeout in seconds waiting for pods
        type: int
        default: 300
      cilium_tetragon_state:
        description: Desired state (present or absent)
        type: str
        default: present
        choices: [present, absent]
