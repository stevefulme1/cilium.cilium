---
- name: Deploy Tetragon security baseline
  hosts: localhost
  connection: local
  roles:
    - role: stevefulme1.cilium.cilium_security_hardening
      cilium_security_hardening_block_privilege_escalation: true
      cilium_security_hardening_monitor_sensitive_files: true
      cilium_security_hardening_restrict_network_tools: true

  tasks:
    - name: Monitor /etc/shadow access
      stevefulme1.cilium.cilium_tracing_policy:
        name: monitor-sensitive-files
        spec:
          kprobes:
            - call: security_file_open
              syscall: false
              args:
                - index: 0
                  type: file
              selectors:
                - matchArgs:
                    - index: 0
                      operator: Prefix
                      values:
                        - /etc/shadow
                        - /etc/passwd
                        - /etc/sudoers
        state: present

    - name: Detect privilege escalation attempts
      stevefulme1.cilium.cilium_tracing_policy:
        name: detect-privilege-escalation
        spec:
          kprobes:
            - call: __x64_sys_setuid
              syscall: true
              args:
                - index: 0
                  type: int
              selectors:
                - matchArgs:
                    - index: 0
                      operator: Equal
                      values:
                        - "0"
        state: present
