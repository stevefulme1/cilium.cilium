---
# Integration tests for stevefulme1.cilium.cilium_config

- name: Apply config (check_mode)
  stevefulme1.cilium.cilium_config:
    kubeconfig: "{{ test_kubeconfig }}"
    namespace: "{{ test_namespace | default('kube-system') }}"
    config_options:
      enable-hubble: "true"
    state: present
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed

- name: Apply config
  stevefulme1.cilium.cilium_config:
    kubeconfig: "{{ test_kubeconfig }}"
    namespace: "{{ test_namespace | default('kube-system') }}"
    config_options:
      enable-hubble: "true"
    state: present
  register: create_result

- name: Verify config was applied
  ansible.builtin.assert:
    that:
      - create_result is changed

- name: Apply config again (idempotency)
  stevefulme1.cilium.cilium_config:
    kubeconfig: "{{ test_kubeconfig }}"
    namespace: "{{ test_namespace | default('kube-system') }}"
    config_options:
      enable-hubble: "true"
    state: present
  register: idem_result

- name: Verify idempotent apply
  ansible.builtin.assert:
    that:
      - idem_result is not changed
