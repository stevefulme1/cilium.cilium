---
# --- CREATE ---
- name: Create TracingPolicy
  stevefulme1.cilium.cilium_tracing_policy:
    kubeconfig: "{{ test_kubeconfig }}"
    name: "{{ test_policy_name }}"
    state: present
    argument_spec: "ansible-test-argument_spec"
    description: "ansible-test-description"
    definition:
      apiVersion: cilium.io/v1alpha1
      kind: TracingPolicy
      metadata:
        name: "{{ test_policy_name }}"
      spec:
        kprobes:
          - call: sys_execve
            syscall: true
            args:
              - index: 0
                type: string
            selectors:
              - matchActions:
                  - action: Post
  register: create_result

- name: Verify creation
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.result.metadata.name == test_policy_name
    quiet: true

# --- IDEMPOTENCY ---
- name: Create same TracingPolicy again
  stevefulme1.cilium.cilium_tracing_policy:
    kubeconfig: "{{ test_kubeconfig }}"
    name: "{{ test_policy_name }}"
    state: present
    argument_spec: "ansible-test-argument_spec"
    description: "ansible-test-description"
    definition:
      apiVersion: cilium.io/v1alpha1
      kind: TracingPolicy
      metadata:
        name: "{{ test_policy_name }}"
      spec:
        kprobes:
          - call: sys_execve
            syscall: true
            args:
              - index: 0
                type: string
            selectors:
              - matchActions:
                  - action: Post
  register: idempotent_result

- name: Verify idempotency
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
    quiet: true

# --- GET INFO ---
- name: Get TracingPolicy info
  stevefulme1.cilium.cilium_tracing_policy_info:
    kubeconfig: "{{ test_kubeconfig }}"
    name: "{{ test_policy_name }}"
  register: info_result

- name: Verify info retrieval
  ansible.builtin.assert:
    that:
      - info_result.resources | length == 1
      - info_result.resources[0].metadata.name == test_policy_name
    quiet: true

# --- UPDATE ---
- name: Update TracingPolicy with additional kprobe
  stevefulme1.cilium.cilium_tracing_policy:
    kubeconfig: "{{ test_kubeconfig }}"
    name: "{{ test_policy_name }}"
    state: present
    argument_spec: "ansible-test-argument_spec"
    description: "ansible-test-description"
    definition:
      apiVersion: cilium.io/v1alpha1
      kind: TracingPolicy
      metadata:
        name: "{{ test_policy_name }}"
      spec:
        kprobes:
          - call: sys_execve
            syscall: true
            args:
              - index: 0
                type: string
            selectors:
              - matchActions:
                  - action: Post
          - call: sys_openat
            syscall: true
            args:
              - index: 0
                type: int
              - index: 1
                type: string
            selectors:
              - matchActions:
                  - action: Post
  register: update_result

- name: Verify update
  ansible.builtin.assert:
    that:
      - update_result is changed
    quiet: true

# --- DELETE ---
- name: Delete TracingPolicy
  stevefulme1.cilium.cilium_tracing_policy:
    kubeconfig: "{{ test_kubeconfig }}"
    name: "{{ test_policy_name }}"
    state: absent
    argument_spec: "ansible-test-argument_spec"
    description: "ansible-test-description"
  register: delete_result

- name: Verify deletion
  ansible.builtin.assert:
    that:
      - delete_result is changed
    quiet: true

# --- DELETE IDEMPOTENCY ---
- name: Delete again (idempotency check)
  stevefulme1.cilium.cilium_tracing_policy:
    kubeconfig: "{{ test_kubeconfig }}"
    name: "{{ test_policy_name }}"
    state: absent
    argument_spec: "ansible-test-argument_spec"
    description: "ansible-test-description"
  register: delete_again_result

- name: Verify delete idempotency
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
    quiet: true
