---
# Integration tests for stevefulme1.cilium.cilium_endpoint_info

- name: Query cilium_endpoint_info
  stevefulme1.cilium.cilium_endpoint_info:
    kubeconfig: "{{ test_kubeconfig }}"
    namespace: "{{ test_namespace | default('kube-system') }}"
  register: result

- name: Verify cilium_endpoint_info returns data
  ansible.builtin.assert:
    that:
      - result is not failed
