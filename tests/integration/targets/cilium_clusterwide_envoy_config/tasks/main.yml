- name: Create cilium_clusterwide_envoy_config (check_mode)
  stevefulme1.cilium.cilium_clusterwide_envoy_config:
    kubeconfig: "{{ test_kubeconfig }}"
    namespace: "{{ test_namespace | default('kube-system') }}"
    name: "ansible-test-{{ resource_prefix }}"
    state: present
    argument_spec: "ansible-test-argument_spec"
    description: "ansible-test-description"
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed

