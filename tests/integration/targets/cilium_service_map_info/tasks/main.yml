---
# Integration tests for stevefulme1.cilium.cilium_service_map_info

- name: Query cilium_service_map_info
  stevefulme1.cilium.cilium_service_map_info:
    kubeconfig: "{{ test_kubeconfig }}"
    namespace: "{{ test_namespace | default('kube-system') }}"
  register: result

- name: Verify cilium_service_map_info returns data
  ansible.builtin.assert:
    that:
      - result is not failed
